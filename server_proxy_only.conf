# proxy-only config for testing with an external target echo server.
# Start target_echo_server on 127.0.0.1:8080, then start the gateway with this file.
listener=tcp,0.0.0.0,18080,proxy,127.0.0.1,8080
listener=udp,0.0.0.0,18080,proxy,127.0.0.1,8080

worker_num=4
log_level=info
log_file=/tmp/myserver.log
